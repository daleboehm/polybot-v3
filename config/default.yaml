engine:
  scan_interval_ms: 300000        # 5 minutes
  snapshot_interval_ms: 3600000   # 1 hour
  risk_check_interval_ms: 60000   # 1 minute
  orderbook_subscribe: true
  max_concurrent_orders: 5
  log_level: info

risk:
  # ═══════════════════════════════════════════════════════════════════
  # RECAP MODE (2026-04-16, Dale's directive, G4):
  # Prior sprint-mode caps were sized for the $257 debt-pressured
  # bankroll and blew up on 2026-04-13 (43.8% daily drawdown, correlated
  # longshot cluster). Recap-day caps are the marathon-era values
  # scaled to the new seed.
  #
  # Recap-contingent caps (set the one that matches the deposit amount
  # BEFORE releasing the kill switch with `kill -USR2`):
  #   $1K recap: max_position_usd 100.00 / max_position_pct 0.10 (ACTIVE)
  #   $2K recap: max_position_usd 200.00 / max_position_pct 0.10
  #   $5K recap: max_position_usd 250.00 / max_position_pct 0.05
  # The per-position pct cap tightens as bankroll grows so a single
  # mispriced market can't dominate the book.
  #
  # The envelope + cluster + portfolio-exposure caps are REARMED here
  # as the outer guardrails (sprint mode had them disabled). Portfolio
  # exposure of 0.15 saved prod from a deeper blowup on 4/13 — it stays.
  #
  # To re-enter sprint mode after a successful recap compounding run,
  # move the above to documentation and loosen these dials deliberately,
  # with a written pre-commit in this comment block.
  # ═══════════════════════════════════════════════════════════════════
  max_position_pct: 0.10          # 10% of equity per position (marathon, RE-TIGHTENED from sprint 0.25)
  max_position_usd: 25.00         # absolute per-position cap (2026-04-21 right-sized for current $374 prod balance: 6.7% max per position)
  fractional_kelly: 0.25          # quarter-Kelly (RE-TIGHTENED from sprint 0.50) — see Fix 1 re: stability
  daily_loss_lockout_usd: 15.00   # catastrophic floor (2026-04-21 tightened: 4% daily loss limit on $374)
  stop_loss_pct: 0.20
  hard_stop_usd: 5.00
  profit_target_pct: 0.40
  max_strategy_envelope_pct: 0.25 # RE-ENABLED for recap (was 0.0 sprint)
  max_cluster_pct: 0.15           # RE-ENABLED for recap (was 0.0 sprint)
  # G2 (2026-04-15): portfolio-wide total-exposure cap — orthogonal to
  # envelope/cluster. The outer guardrail. Saved prod from a deeper
  # blowup 2026-04-13. NEVER disable this without an incident.
  max_portfolio_exposure_pct: 0.15  # 15% of equity across ALL open positions
  # Trailing profit lock still active — captures more on runners
  trailing_activation_pct: 0.20
  trailing_retention_pct: 0.70
  # 2026-04-10: reserve_ratio / trading_ratio / max_positions removed from schema.
  # Dale's directive: "only limit is cash, no reserve." Trading balance == cash.
  # When reserves come back, it'll be via the central-node sweep pattern.
  min_edge_threshold: 0.015       # 1.5% minimum edge (was 0.02 marathon)
  min_hold_hours: 6
  # Dale 2026-04-10: prod must NOT buy anything that resolves past 48 hours.
  # "I need to keep the capital moving." Enforced by strategy-context.ts
  # getActiveMarkets() — strategies don't even see markets outside this window,
  # so no signal is generated, no order is placed. Existing positions stay
  # (they were opened before this rule and will resolve on their own).
  min_hours_to_resolve: 1
  max_hours_to_resolve: 48
  tiered_stops:
    - max_entry: 1.00
      min_entry: 0.50
      stop_pct: 0.30
    - max_entry: 0.50
      min_entry: 0.20
      stop_pct: 0.50
    - max_entry: 0.20
      min_entry: 0.10
      stop_pct: 0.60
    - max_entry: 0.10
      min_entry: 0.00
      stop_pct: null              # no stop for cheap binary bets

execution:
  slippage_bps: 50                # 0.5% slippage model for paper
  bid_premium_pct: 0.02           # bid 2% above market for fills
  max_retries: 3
  retry_delay_ms: 2000
  paper_fill_delay_ms: 500

api:
  clob_base_url: https://clob.polymarket.com
  data_api_base_url: https://data-api.polymarket.com
  ws_url: wss://ws-subscriptions-clob.polymarket.com/ws/market
  rate_limit_per_second: 10
  # 2026-04-16 CTF Exchange V2 scaffolding. Polymarket announced 2026-04-06 a
  # full upgrade: new Exchange contract (0xE1111800...), new order struct
  # (adds `timestamp`/`metadata`/`builder`, removes `taker`/`feeRateBps`/`nonce`),
  # and native stablecoin pUSD replacing bridged USDC.e. Rollout window
  # ~2026-04-20 to 2026-04-27 with ≥1 week notice before the hard flip.
  #
  # This flag currently does NOTHING — V1 is the only implementation wired
  # into clob-router.ts. Scaffold only. On cutover day we add the V2 client
  # behind the same flag and flip `v1` → `v2`.
  #
  # Full migration plan + code-change checklist:
  #   docs/ctf-exchange-v2-migration-plan-2026-04-16.md
  exchange_version: v1

dashboard:
  port: 9100
  auth_enabled: true
  # auth_user and auth_password set via .env

database:
  path: ./data/polybot.db

# R&D → Prod strategy sync. The advisor reads R&D's rd.db read-only on a timer
# and auto-enables/disables sub-strategies on prod based on Wilson LB gating
# over R&D's resolved positions. Before 2026-04-11 this section was missing
# from the yaml which meant the schema default `enabled: false` silently
# disabled the feedback loop entirely — prod had no way to learn from R&D.
#
# Check interval set to 5 min to match the scan cycle. This way R&D's most
# recent resolutions propagate to prod before prod's next scan fires.
advisor:
  enabled: true
  rd_database_path: /opt/polybot-v3-rd/data/rd.db
  check_interval_ms: 300000         # 5 minutes (was 30 min default)
  target_entity_slug: polybot
  # Never auto-disable these even if Wilson gate fires — they have real data
  # feeds (Open-Meteo, Binance) and low resolution counts from the R&D sample.
  #
  # 2026-04-11 Option B addition: longshot.bucketed_fade is protected because
  # R&D shows n=59, 76.3% WR, -$15.49 pnl. Wilson UB=0.853 (Wilson wouldn't
  # disable it anyway), but the -$15 pnl is a clear "high WR, Sharpe-negative"
  # pattern that DSR/PSR would catch and Wilson misses. The protection is
  # preventive in case advisor logic tightens later. Bucketed_fade landed 7
  # of prod's last 30-min fills — protecting it keeps order flow stable.
  # 48-HOUR REVIEW: after prod's own v_strategy_performance has n>=30 on
  # bucketed_fade with real reconciler data, decide whether to keep the
  # protection or let the advisor manage it. See docs/todo.md for the
  # review trigger.
  protected_strategies:
    - weather_forecast
    - crypto_price
    - longshot.bucketed_fade
  thresholds:
    min_resolutions_to_enable: 10
    min_win_rate_to_enable: 50
    min_pnl_to_enable: 0
    min_resolutions_to_disable: 20
    max_win_rate_to_disable: 30

# Attention Router — scouts write high-priority markets to market_priorities
# and this scanner fires strategies on them every 30 seconds out of the
# normal scan cycle. Harmless to leave enabled on engines where no scouts
# are running (finds an empty table, does nothing).
priority_scanner:
  enabled: true
  interval_ms: 30000              # 30 seconds
  max_priorities_per_run: 25
  min_scan_gap_ms: 60000          # don't re-scan the same priority row more than 1x/min
  gc_every_n_runs: 60             # GC expired priority + intel rows every ~30 min

# Scout fleet — in-process market watchers. Volume spike, price jump,
# new listing, and LLM news scouts run on a 60-second tick inside the
# engine process, watching the market cache for patterns and writing
# priority/intel rows. llm-news-scout is a no-op without ANTHROPIC_API_KEY.
# Add scout ids to `disabled_scouts` to kill specific scouts without
# touching code.
scouts:
  enabled: true
  interval_ms: 60000              # 60 seconds between ticks
  # 2026-04-16: llm-news-scout PARKED on both engines. See rd-default.yaml
  # for full diagnosis notes. Short version: Haiku returns {"findings": []}
  # every call because we feed the scout no news, just question text +
  # category tag. The overlay code is left in place (returns NEUTRAL by
  # default — harmless). Re-enable after wiring a real news feed
  # (NewsAPI / Perplexity / web search) into the scout.
  disabled_scouts:
    - llm-news-scout
