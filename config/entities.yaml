# Polybot V3 — 16 Entity Registry
# All entities start in paper mode. Toggle to live via CLI with dual-flag safety.
#
# entity_path semantics:
# - Live entities (polybot): entity_path must point at a directory containing
#   state/api_keys.json (or api_keys.json directly). The v3 prod entity uses
#   /opt/polybot-v3/ with api_keys.json symlinked to /dev/shm/polybot-secrets/
#   on the VPS for tmpfs-only credential storage.
# - Paper entities: entity_path is cosmetic — the wallet loader will log
#   "No wallet credentials found" and return null, which is fine because paper
#   mode doesn't trade live. These point at /opt/polybot-v3/paper-entities/{slug}/
#   so there's no cross-reference to v1/v2 legacy directories.
#
# R2 PR#1 (2026-04-10): value/skew/complement strategies quarantined — see strategy/archive/
# R3c (2026-04-10): v1/v2 legacy paths fully removed; all entity_path values
#   live under /opt/polybot-v3/ or are cosmetic placeholders for paper entities.

entities:
  - slug: polybot
    name: "GC Caspian"
    port: 8080
    entity_path: /opt/polybot-v3
    mode: live
    status: active
    starting_capital: 500.00
    # 2026-04-11 post-reconciler-fix strategy allow-list. Per real prod
    # data (v_strategy_performance after the Phase -1 reconciler fix):
    #   favorites.compounding       n=75  WR=64.3% pnl=+$3.02  KEEP
    #   favorites.near_snipe        n=0   (no data yet)        KEEP (thesis intact)
    #   favorites.fan_fade          n=4   (too small to tell)  KEEP (exploration)
    #   favorites.stratified_bias   n=23  WR=25%   pnl=-$5.80  REMOVE — clear loser
    #   weather_forecast            n=27  WR=66.7% pnl=+$2.25  KEEP
    #   longshot.*                  too few resolutions yet    KEEP
    #   convergence.*               pushes, no real data yet   KEEP
    # Switch favorites from whole-strategy to sub_strategy_ids allow-list
    # so we can explicitly exclude stratified_bias without touching the
    # strategy code.
    strategies:
      - weather_forecast
      - crypto_price
      - strategy_id: favorites
        sub_strategy_ids:
          - compounding
          - near_snipe
          - fan_fade
      - longshot
      - convergence
      # 2026-04-12: sportsbook_fade DISABLED after 24h review.
      # 14 resolutions, 0 wins, 1 loss, -$1.05. The Odds API feed
      # is not producing edge on sports markets. Re-enable after
      # investigation of the sportsbook-fade probability model.
      # - sportsbook_fade
      - cross_market
      - macro_forecast
      # Phase C2 (2026-04-11): whale_copy strategy exists in the code
      # and is registered in the engine, but is NOT in this active list.
      # To activate, UNCOMMENT the next line AND set WHALE_COPY_ENABLED=true
      # in /opt/polybot-v3/.env. See docs/todo.md WHALE ACTIVATION PLAYBOOK.
      # - whale_copy

