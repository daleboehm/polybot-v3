# Polybot V3 — 16 Entity Registry
# All entities start in paper mode. Toggle to live via CLI with dual-flag safety.
#
# entity_path semantics:
# - Live entities (polybot): entity_path must point at a directory containing
#   state/api_keys.json (or api_keys.json directly). The v3 prod entity uses
#   /opt/polybot-v3/ with api_keys.json symlinked to /dev/shm/polybot-secrets/
#   on the VPS for tmpfs-only credential storage.
# - Paper entities: entity_path is cosmetic — the wallet loader will log
#   "No wallet credentials found" and return null, which is fine because paper
#   mode doesn't trade live. These point at /opt/polybot-v3/paper-entities/{slug}/
#   so there's no cross-reference to v1/v2 legacy directories.
#
# R2 PR#1 (2026-04-10): value/skew/complement strategies quarantined — see strategy/archive/
# R3c (2026-04-10): v1/v2 legacy paths fully removed; all entity_path values
#   live under /opt/polybot-v3/ or are cosmetic placeholders for paper entities.

entities:
  - slug: polybot
    name: "GC Caspian"
    port: 8080
    entity_path: /opt/polybot-v3
    mode: live
    status: active
    starting_capital: 500.00
    # 2026-04-11 post-reconciler-fix strategy allow-list. Per real prod
    # data (v_strategy_performance after the Phase -1 reconciler fix):
    #   favorites.compounding       n=75  WR=64.3% pnl=+$3.02  KEEP
    #   favorites.near_snipe        n=0   (no data yet)        KEEP (thesis intact)
    #   favorites.fan_fade          n=4   (too small to tell)  KEEP (exploration)
    #   favorites.stratified_bias   n=23  WR=25%   pnl=-$5.80  REMOVE — clear loser
    #   weather_forecast            n=27  WR=66.7% pnl=+$2.25  KEEP
    #   longshot.*                  too few resolutions yet    KEEP
    #   convergence.*               pushes, no real data yet   KEEP
    # Switch favorites from whole-strategy to sub_strategy_ids allow-list
    # so we can explicitly exclude stratified_bias without touching the
    # strategy code.
    #
    # 2026-04-16 G3: longshot DISABLED on prod pending R&D validation.
    # R&D `systematic_fade` shows the WR-vs-PnL paradox (86.7% WR, -$33 PnL)
    # — high-win-rate + negative P&L is a classic Kelly-at-price-extremes
    # blowup. Prod drew down 80% in 8 days on the same code R&D ran flat.
    # Re-enable after: (a) Fix 1 (Kelly boundary fix) ships, (b) R&D Wilson
    # LB ≥ 0.50 on ≥50 resolved trades, and (c) new recap-day position
    # caps are in place. Until then: NO `longshot` on prod.
    #
    # 2026-04-16 Fix 2: convergence.long_term_grind DISABLED on prod.
    # Single largest correlated-position risk in R&D (277 open, 5.9d avg
    # age). Existing prod convergence positions resolve naturally; no
    # new entries until sopersone's optimal-stopping filter ships.
    #
    # 2026-04-16 Fix 4: weather_forecast is the #1 P&L contributor
    # (+$316 all-time, +$180 on 2026-04-16). Keep enabled. Capital
    # doubling is handled via strategy-weighter config (not here).
    # 2026-04-23 PIVOT: Prod mirrors R&D kill-list + adds missing winners.
    # All sub-strategies gated via polybot-pnl-triage quarter-Kelly verdict over 14d.
    strategies:
      # Survivors (positive quarter-Kelly, n>=50 on R&D):
      # 2026-04-25 KILLED favorites — mirrored R&D Friday decision. compounding edge decayed
      # 64.6% -> 51.9% WR on n=27 recent. fan_fade and stratified_bias already killed.
      # Re-evaluate when we have a favorites sub with positive recent edge.
      # - { strategy_id: favorites,          sub_strategy_ids: [compounding, near_snipe] }  # DISABLED 2026-04-25
      - { strategy_id: longshot,           sub_strategy_ids: [news_overreaction_fade, bucketed_fade] }  # RE-ENABLED with safe subs; systematic_fade stays killed (-$22 / 32% WR)
      - { strategy_id: weather_forecast,   sub_strategy_ids: [next_day_horizon]  # ensemble_spread_fade KILLED 2026-04-27 }  # single_forecast KILLED (-$18 PnL despite 76.5% WR — payout asymmetry 4:1)
      # negrisk_arbitrage REMOVED 04-26: non-exhaustive family bleeds cash (also in never_enable_strategies)
      # Kept as whole strategies (no sub-strategy triage yet):
      - crypto_price
      - cross_market
      - macro_forecast
      - whale_copy
      - complement  # 2026-04-26: intra-market YES+NO arb, zero directional risk
      # STILL DISABLED:
      # - convergence (long_term_grind: -$17 / 44% WR on R&D)
      # - sportsbook_fade (all subs: negative edge, Odds API not producing sports edge)
      # - favorites/stratified_bias (killed 04-23: -$16 / 43% WR)
      # - favorites/fan_fade (killed 04-23: -$52 / 22% WR)
      # - longshot/systematic_fade (killed 04-23: -$22 / 32% WR)
      # - weather_forecast/single_forecast (killed 04-23: payout asymmetry 4:1)

